  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: yelp-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - yelp-net

volumes:
  mongodb_data:
  uploads_data:

networks:
  yelp-net:
    driver: bridge
