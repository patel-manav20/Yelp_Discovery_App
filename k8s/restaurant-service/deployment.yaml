apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
  namespace: yelp-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurant-service
  template:
    metadata:
      labels:
        app: restaurant-service
    spec:
      containers:
        - name: restaurant-service
          image: 904183418399.dkr.ecr.us-east-1.amazonaws.com/lab1-restaurant-service:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          env:
            - name: MONGODB_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGODB_URL
            - name: DB_NAME
              value: yelp_discovery
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: CORS_ORIGINS
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: SECRET_KEY
            - name: YELP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: YELP_API_KEY
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
